<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập Quản trị - Smart Restaurant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-bg: #0f1117;
            --accent: #f97316;
            --accent-hover: #ea580c;
            --page-bg: #f1f4f9;
            --text-main: #1a1d2e;
            --text-muted: #6b7280;
            --card-bg: rgba(255,255,255,0.75);
            --border: rgba(255,255,255,0.25);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background: radial-gradient(circle at 10% 20%, #f9fafb, #eef1f5);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Decorative blobs */
        .bg-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.3;
        }
        .blob-orange { width: 500px; height: 500px; background: #fed7aa; top: -150px; right: -150px; }
        .blob-blue   { width: 400px; height: 400px; background: #bfdbfe; bottom: -100px; left: -100px; }

        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 920px;
            display: flex;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 25px 60px -12px rgba(0,0,0,0.2), 0 0 0 1px rgba(255,255,255,0.6);
            backdrop-filter: blur(16px);
            background: var(--card-bg);
        }

        .login-info {
            background: var(--sidebar-bg);
            color: #fff;
            padding: 48px 36px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 42%;
        }
        .login-info .logo-icon { font-size: 3.5rem; margin-bottom: 8px; }
        .login-info h2 { font-size: 2rem; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 10px; }
        .login-info h2 span { color: var(--accent); }
        .login-info p { color: #9ca3af; font-size: 0.9rem; font-weight: 500; line-height: 1.6; }

        .login-card {
            padding: 48px 40px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: rgba(255,255,255,0.4);
        }
        .login-card h3 {
            font-weight: 800;
            font-size: 1.6rem;
            color: var(--text-main);
            margin-bottom: 28px;
        }
        .form-label {
            font-weight: 700;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        .form-control {
            border-radius: 14px;
            padding: 14px 18px;
            font-weight: 600;
            border: 1.5px solid #e5e7eb;
            background: #fff;
            transition: all 0.2s;
            font-family: 'Be Vietnam Pro', sans-serif;
        }
        .form-control:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(249,115,22,0.2);
        }
        .btn-login {
            background: linear-gradient(135deg, #f97316, #ea580c);
            border: none;
            color: #fff;
            font-weight: 700;
            padding: 13px;
            border-radius: 14px;
            transition: all 0.2s;
            font-size: 1rem;
            letter-spacing: 0.3px;
            margin-top: 4px;
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #ea580c, #c2410c);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(249,115,22,0.4);
            color: #fff;
        }
        .link-muted {
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.85rem;
            text-decoration: none;
            transition: color 0.2s;
        }
        .link-muted:hover { color: var(--accent); }

        @media (max-width: 768px) {
            .login-info { display: none; }
            .login-wrapper { max-width: 400px; }
        }
    </style>
</head>
<body>
    <div class="bg-blob blob-orange"></div>
    <div class="bg-blob blob-blue"></div>

    <div class="login-wrapper">
        <div class="login-info">
            <div class="logo-icon">🍳</div>
            <h2>Smart<span>POS</span></h2>
            <p>Hệ thống quản lý nhà hàng thông minh. Đăng nhập để bắt đầu phiên làm việc.</p>
        </div>

        <div class="login-card">
            <h3>👨‍🍳 Đăng Nhập</h3>
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Tên đăng nhập</label>
                    <input type="text" id="username" class="form-control" placeholder="Nhập tài khoản..." required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Mật khẩu</label>
                    <input type="password" id="password" class="form-control" placeholder="Nhập mật khẩu..." required>
                </div>

                <div id="thong-bao-loi" class="text-danger small mb-3 d-none fw-semibold">
                    Tài khoản hoặc mật khẩu không chính xác!
                </div>

                <button type="button" class="btn btn-login w-100 mb-3" onclick="xuLyDangNhap()">
                    Đăng nhập vào Hệ thống
                </button>

                <div class="text-center">
                    <a href="/register.html" class="link-muted">Chưa có tài khoản? Đăng ký ngay →</a>
                </div>
            </form>
        </div>
    </div>

    <script src="/api-helper.js"></script>
    <script>
    async function xuLyDangNhap() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const thongBao = document.getElementById('thong-bao-loi');

        try {
            const result = await api.login(user, pass);

            if (result.success) {
                thongBao.classList.add('d-none');
                alert('Chào mừng sếp: ' + result.data.hoTen + ' 🎉');
                // Lưu thông tin admin vào sessionStorage để các trang khác dùng
                sessionStorage.setItem('adminUser', JSON.stringify(result.data));
                // api.login() đã lưu userId vào localStorage, giờ chỉ cần redirect
                setTimeout(() => {
                    window.location.href = '/admin.html';
                }, 1000);
            } else {
                thongBao.innerText = result.message || 'Sai tài khoản hoặc mật khẩu!';
                thongBao.classList.remove('d-none');
            }
        } catch (error) {
            console.error("Lỗi kết nối Server:", error);
            thongBao.innerText = 'Lỗi kết nối đến máy chủ!';
            thongBao.classList.remove('d-none');
        }
    }
    </script>
</body>
</html>
