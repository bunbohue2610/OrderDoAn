<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Menu Gọi Món • QR Smart</title>
    <!-- Bootstrap 5 + Fonts + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        /* ========== CSS CUSTOM PROPERTIES ========== */
        :root {
            --primary: #f97316;
            --primary-light: #fb923c;
            --primary-gradient: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
            --accent: #f97316;
            --accent-gradient: linear-gradient(135deg, #f97316 0%, #c2410c 100%);
            --success-gradient: linear-gradient(135deg, #10b981 0%, #059669 100%);
            --warning-gradient: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            --bg-body: #f8fafc;
            --card-bg: rgba(255,255,255,0.9);
            --glass-bg: rgba(255,255,255,0.72);
            --glass-border: rgba(255,255,255,0.6);
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.03);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.06);
            --shadow-lg: 0 20px 40px rgba(0,0,0,0.08);
            --radius-xl: 32px;
            --radius-lg: 24px;
            --radius-md: 18px;
            --radius-sm: 14px;
            --transition: 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-body);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: #1e293b;
            padding-bottom: 130px;
            -webkit-font-smoothing: antialiased;
            background-image: radial-gradient(circle at 20% 10%, rgba(249,115,22,0.04) 0%, transparent 50%),
                              radial-gradient(circle at 80% 90%, rgba(249,115,22,0.05) 0%, transparent 50%);
            min-height: 100vh;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.02); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .lam-mo {
            filter: blur(20px) brightness(0.97);
            pointer-events: none;
            transition: filter 0.3s;
        }

        /* Overlay nhập bàn */
        #overlay-nhap-ban {
            background: rgba(15, 23, 42, 0.55);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
            transition: opacity 0.3s;
        }
        #overlay-nhap-ban.show { display: flex; }
        .modal-glass {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: var(--radius-xl);
            box-shadow: 0 25px 50px -8px rgba(0,0,0,0.25), 0 0 0 1px rgba(255,255,255,0.6);
            padding: 2.2rem 1.8rem;
            width: 380px;
            max-width: 92%;
            animation: modalPop 0.25s ease;
        }
        @keyframes modalPop {
            0% { transform: scale(0.92); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .input-ban-modern {
            border-radius: 60px;
            border: 1.5px solid #e2e8f0;
            background: white;
            font-weight: 600;
            text-align: center;
            letter-spacing: 1px;
            padding: 14px 20px;
            transition: var(--transition);
        }
        .input-ban-modern:focus {
            border-color: var(--primary-light);
            box-shadow: 0 0 0 4px rgba(249,115,22,0.15);
            outline: none;
        }

        .header-gradient {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 0 0 var(--radius-lg) var(--radius-lg);
            padding: 18px 4px 10px;
            margin-bottom: 18px;
        }
        #ten-ban-hien-tai {
            background: var(--primary-gradient);
            border-radius: 40px;
            padding: 10px 22px;
            font-weight: 600;
            font-size: 0.9rem;
            color: white;
            box-shadow: 0 8px 18px rgba(249,115,22,0.35);
            letter-spacing: 0.3px;
        }

        .category-scroll {
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            padding: 6px 2px 20px;
            gap: 10px;
            scrollbar-width: thin;
        }
        .btn-category {
            border-radius: 50px;
            padding: 10px 22px;
            font-weight: 650;
            font-size: 0.85rem;
            border: 1px solid #e9eef3;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(8px);
            color: #334155;
            transition: var(--transition);
            white-space: nowrap;
            box-shadow: var(--shadow-sm);
            letter-spacing: -0.2px;
        }
        .btn-category.active {
            background: var(--primary-gradient);
            color: white;
            border-color: transparent;
            box-shadow: 0 8px 18px rgba(249,115,22,0.4);
            transform: scale(1.03);
            font-weight: 700;
        }
        .btn-category:active { transform: scale(0.96); }

        .card-mon-an {
            border: none;
            border-radius: var(--radius-lg);
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow-md);
            transition: var(--transition);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .card-mon-an:hover {
            transform: translateY(-8px);
            box-shadow: 0 24px 38px -12px rgba(0,0,0,0.15);
        }
        .card-mon-an img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .card-mon-an:hover img { transform: scale(1.05); }
        .gia-tien {
            font-weight: 800;
            font-size: 1.15rem;
            background: linear-gradient(120deg, #f97316, #c2410c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .btn-them-mon {
            background: var(--success-gradient);
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: 700;
            padding: 8px 0;
            font-size: 0.9rem;
            transition: var(--transition);
            box-shadow: 0 6px 14px rgba(16,185,129,0.35);
            letter-spacing: 0.2px;
        }
        .btn-them-mon:hover {
            transform: scale(0.96);
            filter: brightness(1.05);
        }

        /* Giỏ hàng */
        #khung-gio-hang {
            background: rgba(255,255,255,0.78);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            box-shadow: 0 -20px 35px rgba(0,0,0,0.06), 0 0 0 1px rgba(255,255,255,0.7);
            transition: all 0.25s;
        }
        #chi-tiet-gio {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.33, 1, 0.68, 1);
            background: rgba(0,0,0,0.012);
            border-radius: 20px;
            margin: 0 12px;
        }
        #chi-tiet-gio.mo {
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 8px;
        }
        .gio-hang-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 8px;
            border-bottom: 1px solid rgba(0,0,0,0.04);
            font-weight: 500;
        }
        .btn-gui-don {
            background: var(--primary-gradient);
            border: none;
            border-radius: 60px;
            padding: 12px 24px;
            font-weight: 700;
            transition: var(--transition);
            color: white;
            box-shadow: 0 12px 24px rgba(249,115,22,0.35);
            letter-spacing: 0.3px;
        }
        .btn-gui-don:hover {
            transform: scale(0.96);
            filter: brightness(1.1);
        }
        .price-total {
            font-weight: 800;
            background: linear-gradient(135deg, #f97316, #c2410c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.1rem;
        }

        /* Toast nhỏ */
        .toast-noti {
            position: fixed;
            bottom: 130px;
            left: 20px;
            background: rgba(30,41,59,0.92);
            backdrop-filter: blur(12px);
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            z-index: 9999;
            animation: slideUp 0.25s ease, fadeOut 0.3s 1s forwards;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes fadeOut {
            to { opacity: 0; transform: translateY(-8px); }
        }

        /* Skeleton */
        .skeleton-card {
            border-radius: var(--radius-lg);
            background: rgba(255,255,255,0.7);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            animation: shimmer 2s infinite;
        }
        .skeleton-img {
            width: 100%;
            height: 140px;
            background: linear-gradient(90deg, #e9eef3 25%, #f1f5f9 50%, #e9eef3 75%);
            background-size: 200% 100%;
        }
        .skeleton-text {
            height: 14px;
            background: #e2e8f0;
            border-radius: 20px;
            margin: 12px 10px;
            width: 70%;
        }
        .skeleton-text.short { width: 40%; }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        /* Modal thông báo trung tâm */
        .modal-glass-popup .modal-content {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(30px);
            border-radius: var(--radius-xl);
            border: 1px solid rgba(255,255,255,0.7);
            box-shadow: 0 30px 50px rgba(0,0,0,0.25);
        }
        .modal-glass-popup .modal-header {
            border-bottom: none;
            justify-content: center;
            padding-bottom: 0;
        }
        .modal-glass-popup .modal-footer {
            border-top: none;
            justify-content: center;
        }
        .icon-success {
            color: #10b981;
            font-size: 3rem;
            filter: drop-shadow(0 4px 6px rgba(16,185,129,0.4));
        }
        .icon-error {
            color: #ef4444;
            font-size: 3rem;
            filter: drop-shadow(0 4px 6px rgba(239,68,68,0.4));
        }
        .btn-primary-custom {
            background: var(--primary-gradient);
            border: none;
            color: white;
            font-weight: 600;
        }
        .btn-primary-custom:hover {
            filter: brightness(1.1);
            color: white;
        }
    </style>
</head>
<body>

<!-- Overlay nhập bàn -->
<div id="overlay-nhap-ban" class="position-fixed w-100 h-100 top-0 start-0">
    <div class="modal-glass text-center">
        <div class="mb-3">
            <i class="fas fa-qrcode fa-3x" style="color: #f97316; opacity: 0.8;"></i>
        </div>
        <h4 class="fw-bold mb-2" style="color: #1e293b;">Chào mừng bạn 🍽️</h4>
        <p class="text-secondary mb-4">Quét mã QR • Nhập số bàn để bắt đầu</p>
        <input type="text" id="input-so-ban" class="form-control input-ban-modern mb-3" placeholder="Ví dụ: B01, B12" autocomplete="off">
        <button class="btn text-white fw-semibold w-100 py-3" style="background: var(--primary-gradient); border-radius: 60px; border: none;" onclick="xacNhanBan()">
            <i class="fas fa-arrow-right-to-bracket me-2"></i>Vào thực đơn
        </button>
    </div>
</div>

<div id="noi-dung-chinh">
    <div class="container py-3">
        <div class="header-gradient d-flex justify-content-between align-items-center flex-wrap mb-2 px-1">
            <div class="d-flex align-items-center gap-2">
                <i class="fas fa-utensils fs-4" style="color: #f97316;"></i>
                <h2 class="fw-extrabold mb-0" style="font-size: 1.8rem; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">MENU</h2>
            </div>
            <div id="khung-ten-ban" style="display: none;">
                <span id="ten-ban-hien-tai" class="badge fs-6 shadow-sm"><i class="fas fa-chair me-1"></i> Bàn ...</span>
            </div>
        </div>

        <div class="category-scroll" id="thanh-danh-muc">
            <button class="btn-category active" onclick="locTheoDanhMuc(0, this)"><i class="fas fa-border-all me-1"></i> Tất cả</button>
        </div>

        <div id="danh-sach-mon" class="row g-3">
            <div class="col-6 col-md-4 col-lg-3">
                <div class="skeleton-card">
                    <div class="skeleton-img"></div>
                    <div class="skeleton-text"></div>
                    <div class="skeleton-text short"></div>
                </div>
            </div>
            <div class="col-6 col-md-4 col-lg-3">
                <div class="skeleton-card">
                    <div class="skeleton-img"></div>
                    <div class="skeleton-text"></div>
                    <div class="skeleton-text short"></div>
                </div>
            </div>
            <div class="col-6 col-md-4 col-lg-3">
                <div class="skeleton-card">
                    <div class="skeleton-img"></div>
                    <div class="skeleton-text"></div>
                    <div class="skeleton-text short"></div>
                </div>
            </div>
            <div class="col-6 col-md-4 col-lg-3">
                <div class="skeleton-card">
                    <div class="skeleton-img"></div>
                    <div class="skeleton-text"></div>
                    <div class="skeleton-text short"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Giỏ hàng -->
    <div id="khung-gio-hang" class="fixed-bottom shadow-lg" style="display: none;">
        <div id="chi-tiet-gio" class="px-3 pt-2">
            <div class="d-flex justify-content-between align-items-center mb-2 px-2">
                <small class="text-muted fw-semibold"><i class="fas fa-receipt me-1"></i> Chi tiết đơn</small>
                <button class="btn btn-sm text-danger fw-semibold" onclick="resetGioHang()" style="font-size:0.8rem;"><i class="fas fa-trash-alt me-1"></i>Xoá</button>
            </div>
            <div id="danh-sach-gio"></div>
        </div>
        <div class="p-3 container-fluid d-flex justify-content-between align-items-center">
            <div onclick="toggleGioHang()" style="cursor: pointer; flex: 1;">
                <div class="d-flex align-items-center gap-2">
                    <i class="fas fa-shopping-basket fs-5" style="color: #f97316;"></i>
                    <h6 class="mb-0 fw-bold">Giỏ <span id="so-luong-mon" class="badge bg-danger rounded-pill ms-1">0</span></h6>
                    <span id="toggle-icon" class="small ms-2 text-muted fw-semibold">▲ Xem</span>
                </div>
                <span class="text-muted small">Tổng: <strong id="tong-tien" class="price-total">0đ</strong></span>
            </div>
            <button class="btn btn-gui-don text-white px-4" onclick="guiDonHang()">
                <i class="fas fa-paper-plane me-1"></i> Gửi đơn
            </button>
        </div>
    </div>
</div>

<!-- Modal thông báo trung tâm -->
<div class="modal fade modal-glass-popup" id="modalThongBao" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-sm">
    <div class="modal-content text-center p-3">
      <div class="modal-header border-0 pb-0">
        <i id="modalIcon" class="fas fa-check-circle icon-success"></i>
      </div>
      <div class="modal-body pt-2">
        <h5 id="modalTitle" class="fw-bold mb-2">Thành công!</h5>
        <p id="modalMessage" class="text-muted mb-0">Đơn hàng đã được gửi đi.</p>
      </div>
      <div class="modal-footer border-0 pt-0">
        <button type="button" class="btn btn-primary-custom rounded-pill px-4 fw-semibold" data-bs-dismiss="modal">Đóng</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let gioHang = [];
    let tongTien = 0;
    let maBanHienTai = "";
    let tatCaMonAn = [];
    let gioHangMo = false;
    let adminId = null;

    function getHeaders() {
        const headers = { 'Content-Type': 'application/json' };
        if (adminId) headers['X-User-Id'] = adminId;
        return headers;
    }

    const modalThongBao = new bootstrap.Modal(document.getElementById('modalThongBao'));

    function showModal(title, message, type = 'success') {
        const icon = document.getElementById('modalIcon');
        const titleEl = document.getElementById('modalTitle');
        const msgEl = document.getElementById('modalMessage');
        
        if (type === 'success') {
            icon.className = 'fas fa-check-circle icon-success';
            titleEl.innerText = title || 'Thành công!';
        } else if (type === 'error') {
            icon.className = 'fas fa-times-circle icon-error';
            titleEl.innerText = title || 'Lỗi!';
        } else {
            icon.className = 'fas fa-info-circle text-primary';
            titleEl.innerText = title;
        }
        msgEl.innerText = message;
        modalThongBao.show();
    }

    function xacNhanBan() {
        const val = document.getElementById('input-so-ban').value.trim();
        if (!val) { showModal('Thiếu thông tin', 'Vui lòng nhập số bàn (VD: B01, A03)', 'error'); return; }
        maBanHienTai = val;
        document.getElementById('overlay-nhap-ban').classList.remove('show');
        document.getElementById('noi-dung-chinh').classList.remove('lam-mo');
        document.getElementById('ten-ban-hien-tai').innerHTML = `<i class="fas fa-map-pin me-1"></i> Bàn ${maBanHienTai}`;
        document.getElementById('khung-ten-ban').style.display = 'block';
        layMonAn();
        layDanhMuc();
    }

    async function guiDonHang() {
        if (gioHang.length === 0) {
            showModal('Giỏ hàng trống', 'Vui lòng chọn ít nhất một món trước khi gửi.', 'warning');
            return;
        }
        const data = {
            soBan: maBanHienTai,
            tongTien: tongTien,
            items: gioHang.map(i => ({
                idMonAn: i.id,
                tenMon: i.tenMon,
                donGia: i.giaTien,
                giaTien: i.giaTien,
                soLuong: i.soLuong
            }))
        };
        try {
            const res = await fetch("/api/orders/gui-don", {
                method: "POST",
                headers: getHeaders(),
                body: JSON.stringify(data)
            });
            if (res.ok) {
                showModal('Đặt món thành công! 🎉', `Bàn ${maBanHienTai} đã gửi đơn • Tổng ${new Intl.NumberFormat('vi-VN').format(tongTien)}đ`, 'success');
                resetGioHang();
            } else {
                const errorMsg = await res.text();
                showModal('Gửi đơn thất bại', errorMsg || 'Vui lòng thử lại sau.', 'error');
            }
        } catch (err) {
            showModal('Lỗi kết nối', 'Không thể kết nối đến máy chủ. Kiểm tra mạng và thử lại.', 'error');
        }
    }

    function resetGioHang() {
        gioHang = [];
        tongTien = 0;
        document.getElementById('khung-gio-hang').style.display = 'none';
        capNhatGiaoDienGio();
        if(gioHangMo) {
            gioHangMo = false;
            document.getElementById('chi-tiet-gio').classList.remove('mo');
            document.getElementById('toggle-icon').innerHTML = '▲ Xem';
        }
    }

    function themVaoGio(btn) {
        const id = parseInt(btn.dataset.id);
        const ten = btn.dataset.ten;
        const gia = parseFloat(btn.dataset.gia);
        const item = gioHang.find(i => i.id === id);
        if (item) item.soLuong++;
        else gioHang.push({ id: id, tenMon: ten, giaTien: gia, soLuong: 1 });
        tongTien += gia;
        capNhatGiaoDienGio();
        showToast(`➕ Đã thêm ${ten}`);
    }

    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'toast-noti';
        toast.innerText = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 1400);
    }

    function capNhatGiaoDienGio() {
        const sl = gioHang.reduce((s, i) => s + i.soLuong, 0);
        document.getElementById('so-luong-mon').innerText = sl;
        document.getElementById('tong-tien').innerHTML = new Intl.NumberFormat('vi-VN').format(tongTien) + 'đ';
        document.getElementById('khung-gio-hang').style.display = sl > 0 ? 'block' : 'none';
        const gioContainer = document.getElementById('danh-sach-gio');
        if (gioHang.length === 0) {
            gioContainer.innerHTML = '<div class="text-center text-muted py-3 small"><i class="fas fa-box-open"></i> Giỏ trống</div>';
        } else {
            gioContainer.innerHTML = gioHang.map(i => `
                <div class="gio-hang-item">
                    <span class="fw-semibold text-truncate" style="max-width: 150px;">${i.tenMon}</span>
                    <div class="d-flex align-items-center gap-3">
                        <span class="badge bg-light text-dark fw-bold">${i.soLuong}</span>
                        <span class="fw-bold text-danger">${new Intl.NumberFormat('vi-VN').format(i.giaTien)}đ</span>
                    </div>
                </div>`).join('');
        }
    }

    function toggleGioHang() {
        gioHangMo = !gioHangMo;
        const chiTiet = document.getElementById('chi-tiet-gio');
        const toggleIcon = document.getElementById('toggle-icon');
        if (gioHangMo) {
            chiTiet.classList.add('mo');
            toggleIcon.innerHTML = '▼ Ẩn';
        } else {
            chiTiet.classList.remove('mo');
            toggleIcon.innerHTML = '▲ Xem';
        }
    }

    async function layMonAn() {
        try {
            const res = await fetch('/api/mon-an', { headers: getHeaders() });
            if (!res.ok) throw new Error('Không thể tải món');
            tatCaMonAn = await res.json();
            hienThiMenu(tatCaMonAn);
        } catch (err) {
            document.getElementById('danh-sach-mon').innerHTML = `<div class="col-12 text-center text-danger py-5"><i class="fas fa-exclamation-triangle"></i> Lỗi tải dữ liệu, thử lại sau.</div>`;
        }
    }

    function hienThiMenu(list) {
        const container = document.getElementById('danh-sach-mon');
        if (!list || list.length === 0) {
            container.innerHTML = `<div class="col-12 text-center py-5 text-muted"><i class="fas fa-utensil-spoon"></i> Không có món nào</div>`;
            return;
        }
        container.innerHTML = list.map(mon => `
            <div class="col-6 col-md-4 col-lg-3">
                <div class="card-mon-an">
                    <img src="${mon.hinhAnh || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=400&h=250&fit=crop'}" alt="${mon.tenMon}">
                    <div class="card-body p-3 d-flex flex-column">
                        <h6 class="fw-bold mb-1 text-truncate">${mon.tenMon}</h6>
                        <p class="gia-tien mt-1 mb-2 fs-6">${new Intl.NumberFormat('vi-VN').format(mon.giaTien)}đ</p>
                        <button class="btn btn-them-mon mt-auto w-100"
                            data-id="${mon.id}" data-ten="${mon.tenMon.replace(/'/g, "\\'")}" data-gia="${mon.giaTien}"
                            onclick="themVaoGio(this)"><i class="fas fa-plus-circle me-1"></i> Thêm</button>
                    </div>
                </div>
            </div>`).join('');
    }

    async function layDanhMuc() {
        try {
            const res = await fetch('/api/danh-muc', { headers: getHeaders() });
            const data = await res.json();
            const container = document.getElementById('thanh-danh-muc');
            container.innerHTML = `<button class="btn-category active" onclick="locTheoDanhMuc(0, this)"><i class="fas fa-border-all me-1"></i> Tất cả</button>`;
            data.forEach(dm => {
                const btn = document.createElement('button');
                btn.className = 'btn-category';
                btn.innerHTML = `<i class="fas fa-tag me-1"></i> ${dm.tenDanhMuc}`;
                btn.onclick = (e) => locTheoDanhMuc(dm.id, e.currentTarget);
                container.appendChild(btn);
            });
        } catch (err) {
            console.warn("Lỗi tải danh mục:", err);
        }
    }

    function locTheoDanhMuc(id, el) {
        document.querySelectorAll('.btn-category').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        const filtered = id === 0 ? tatCaMonAn : tatCaMonAn.filter(m => m.danhMuc && m.danhMuc.id === id);
        hienThiMenu(filtered);
    }

    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        const ban = urlParams.get('ban');
        const admin = urlParams.get('adminId') || urlParams.get('admin');
        if (admin) adminId = admin;
        if (ban) {
            document.getElementById('input-so-ban').value = ban;
            xacNhanBan();
        } else {
            document.getElementById('overlay-nhap-ban').classList.add('show');
            document.getElementById('noi-dung-chinh').classList.add('lam-mo');
        }
    };
</script>
</body>
</html>
