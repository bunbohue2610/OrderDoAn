spring.application.name=quan-ly-mon-an
# Server
server.port=8080

# SQL Server DataSource
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=QuanLyDatMonDB;encrypt=true;trustServerCertificate=true;sendStringParametersAsUnicode=true
spring.datasource.username=sa
spring.datasource.password=123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Jackson (Xử lý ngày giờ)
spring.jackson.time-zone=Asia/Ho_Chi_Minh